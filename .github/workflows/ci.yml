name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install bash shellcheck bats-core

      - name: Prefer Homebrew Bash
        run: echo "$(brew --prefix)/bin" >> "$GITHUB_PATH"

      - name: Lint
        run: make lint

      - name: Test
        run: make test
